<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Temperature Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide-react/0.263.1/lucide-react.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --sea-blue-50: #f0f9ff;
            --sea-blue-100: #e0f2fe;
            --sea-blue-500: #0ea5e9;
            --sea-blue-600: #0284c7;
            --sea-blue-700: #0369a1;
            --sea-blue-900: #0c4a6e;
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .dark {
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .sea-blue-theme {
            background-color: var(--sea-blue-50);
        }

        .dark .sea-blue-theme {
            background-color: #0c4a6e;
        }

        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: all 0.3s;
        }

        .dark .card {
            background: #1e293b;
            border: 1px solid #334155;
        }

        .btn-primary {
            background-color: var(--sea-blue-600);
            color: white;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--sea-blue-700);
        }

        /* Warehouse Decoration */
        .warehouse-icon {
            opacity: 0.1;
            position: fixed;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="app"></div>

    <script>
        // State Management
        let state = {
            isLoggedIn: false,
            user: { name: '', company: '' },
            currentMenu: 'dashboard',
            isDarkMode: false,
            language: 'id', // 'id' or 'en'
            warehouses: [
                { id: 1, name: 'Gudang A (Farmasi)', temp: 4, type: 'Cold Storage', sensitivity: 'High', location: 'Blok North' },
                { id: 2, name: 'Gudang B (Elektronik)', temp: 22, type: 'Dry Storage', sensitivity: 'Medium', location: 'Blok South' },
                { id: 3, name: 'Gudang C (Bahan Kimia)', temp: 15, type: 'Hazardous', sensitivity: 'Critical', location: 'Blok West' }
            ],
            history: [
                { id: 1, warehouse: 'Gudang A', temp: 4.2, time: '2023-10-27 08:00' },
                { id: 2, warehouse: 'Gudang B', temp: 21.5, time: '2023-10-27 08:30' },
                { id: 3, warehouse: 'Gudang C', temp: 15.1, time: '2023-10-27 09:00' }
            ]
        };

        const translations = {
            id: {
                loginTitle: "Login Sistem Monitoring",
                empName: "Nama Karyawan",
                compName: "Nama Perusahaan",
                btnLogin: "Masuk",
                dashboard: "Dasbor",
                history: "Riwayat Terakhir",
                warehouseList: "Daftar Gudang & Suhu",
                settings: "Pengaturan Gudang",
                logout: "Keluar",
                temp: "Suhu",
                status: "Status",
                sensitivity: "Kelemahan Barang",
                actions: "Aksi",
                addWarehouse: "Tambah Gudang",
                edit: "Ubah",
                delete: "Hapus",
                save: "Simpan",
                cancel: "Batal",
                name: "Nama",
                location: "Lokasi",
                type: "Tipe",
                emptyHistory: "Belum ada riwayat."
            },
            en: {
                loginTitle: "Monitoring System Login",
                empName: "Employee Name",
                compName: "Company Name",
                btnLogin: "Login",
                dashboard: "Dashboard",
                history: "Last History",
                warehouseList: "Warehouse & Temp List",
                settings: "Warehouse Settings",
                logout: "Logout",
                temp: "Temperature",
                status: "Status",
                sensitivity: "Item Sensitivity",
                actions: "Actions",
                addWarehouse: "Add Warehouse",
                edit: "Edit",
                delete: "Delete",
                save: "Save",
                cancel: "Cancel",
                name: "Name",
                location: "Location",
                type: "Type",
                emptyHistory: "No history available."
            }
        };

        function t(key) {
            return translations[state.language][key];
        }

        function toggleDarkMode() {
            state.isDarkMode = !state.isDarkMode;
            document.body.classList.toggle('dark', state.isDarkMode);
            render();
        }

        function toggleLanguage() {
            state.language = state.language === 'id' ? 'en' : 'id';
            render();
        }

        function handleLogin(e) {
            e.preventDefault();
            const name = document.getElementById('loginName').value;
            const company = document.getElementById('loginCompany').value;
            if(name && company) {
                state.user = { name, company };
                state.isLoggedIn = true;
                render();
            }
        }

        function deleteWarehouse(id) {
            state.warehouses = state.warehouses.filter(w => w.id !== id);
            render();
        }

        function addWarehouse() {
            const name = prompt("Nama Gudang / Warehouse Name:");
            const temp = prompt("Suhu Saat Ini / Current Temp:");
            const sensitivity = prompt("Kelemahan (Low/Medium/High/Critical):");
            if(name && temp) {
                state.warehouses.push({
                    id: Date.now(),
                    name,
                    temp: parseFloat(temp),
                    sensitivity: sensitivity || 'Medium',
                    location: 'TBA',
                    type: 'Standard'
                });
                render();
            }
        }

        function editWarehouse(id) {
            const w = state.warehouses.find(item => item.id === id);
            const newName = prompt("Ubah Nama:", w.name);
            if(newName) {
                w.name = newName;
                render();
            }
        }

        // Views
        function renderLogin() {
            return `
                <div class="min-h-screen flex items-center justify-center p-6" style="background: linear-gradient(135deg, #0369a1 0%, #075985 100%)">
                    <div class="card w-full max-w-md p-8">
                        <div class="flex justify-center mb-6">
                            <div class="bg-sky-100 p-4 rounded-full">
                                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#0369a1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                            </div>
                        </div>
                        <h1 class="text-2xl font-bold text-center mb-8 text-sky-900">${t('loginTitle')}</h1>
                        <form onsubmit="handleLogin(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">${t('empName')}</label>
                                <input id="loginName" type="text" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-sky-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">${t('compName')}</label>
                                <input id="loginCompany" type="text" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-sky-500 outline-none">
                            </div>
                            <button type="submit" class="w-full py-3 btn-primary rounded-lg font-semibold shadow-lg">
                                ${t('btnLogin')}
                            </button>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderSidebar() {
            const menuItems = [
                { id: 'dashboard', icon: 'LayoutDashboard', label: t('dashboard') },
                { id: 'history', icon: 'Clock', label: t('history') },
                { id: 'list', icon: 'Thermometer', label: t('warehouseList') },
                { id: 'settings', icon: 'Settings', label: t('settings') }
            ];

            return `
                <div class="w-64 min-h-screen bg-sky-900 text-white p-6 hidden md:block">
                    <div class="mb-10">
                        <h2 class="text-xl font-bold flex items-center gap-2">
                            <span class="p-2 bg-sky-500 rounded-lg">W</span>
                            Warehouse PRO
                        </h2>
                        <p class="text-xs text-sky-300 mt-1">${state.user.company}</p>
                    </div>
                    <nav class="space-y-2">
                        ${menuItems.map(item => `
                            <button onclick="state.currentMenu='${item.id}'; render();" 
                                class="w-full flex items-center gap-3 p-3 rounded-lg transition ${state.currentMenu === item.id ? 'bg-sky-700' : 'hover:bg-sky-800'}">
                                ${item.label}
                            </button>
                        `).join('')}
                    </nav>
                    <div class="mt-auto pt-10 border-t border-sky-800">
                        <div class="text-sm mb-4">
                            <p class="text-sky-300">${t('empName')}:</p>
                            <p class="font-semibold text-white">${state.user.name}</p>
                        </div>
                        <button onclick="state.isLoggedIn=false; render();" class="text-red-300 hover:text-red-100 flex items-center gap-2">
                             ${t('logout')}
                        </button>
                    </div>
                </div>
            `;
        }

        function renderHeader() {
            return `
                <header class="h-16 border-b flex items-center justify-between px-6 bg-white dark:bg-slate-800 dark:border-slate-700">
                    <div class="md:hidden font-bold text-sky-600">WH-PRO</div>
                    <div class="hidden md:block italic text-slate-400">Monitoring System v1.2</div>
                    <div class="flex items-center gap-4">
                        <button onclick="toggleLanguage()" class="px-3 py-1 border rounded text-xs font-bold hover:bg-slate-100 dark:hover:bg-slate-700">
                            ${state.language === 'id' ? 'ID' : 'EN'}
                        </button>
                        <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700">
                            ${state.isDarkMode ? '🌞' : '🌙'}
                        </button>
                    </div>
                </header>
            `;
        }

        function renderDashboard() {
            return `
                <div class="p-6 space-y-6">
                    <h1 class="text-2xl font-bold">${t('dashboard')}</h1>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="card p-6 border-l-4 border-sky-500">
                            <p class="text-sm text-slate-500">Total Gudang</p>
                            <h3 class="text-3xl font-bold">${state.warehouses.length}</h3>
                        </div>
                        <div class="card p-6 border-l-4 border-green-500">
                            <p class="text-sm text-slate-500">Suhu Rata-rata</p>
                            <h3 class="text-3xl font-bold">13.6°C</h3>
                        </div>
                        <div class="card p-6 border-l-4 border-amber-500">
                            <p class="text-sm text-slate-500">Alert Aktif</p>
                            <h3 class="text-3xl font-bold">0</h3>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                        <div class="card p-6">
                            <h4 class="font-bold mb-4">Gudang Tersibuk</h4>
                            <div class="h-40 flex items-center justify-center bg-sky-50 rounded-lg dark:bg-sky-900/20">
                                [Chart Visualization Placeholder]
                            </div>
                        </div>
                        <div class="card p-6 relative overflow-hidden">
                            <h4 class="font-bold mb-4">Statistik Keamanan</h4>
                            <p class="text-sm">Semua gudang dalam parameter suhu yang aman berdasarkan jenis komoditas.</p>
                            <!-- Decoration icon -->
                            <div class="absolute -bottom-4 -right-4 opacity-10 rotate-12">
                                <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 8l-2-2H5L3 8v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8z"/><path d="M3 10h18"/><path d="M16 10v10"/><path d="M8 10v10"/><path d="M12 10v10"/></svg>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderHistory() {
            return `
                <div class="p-6">
                    <h1 class="text-2xl font-bold mb-6">${t('history')}</h1>
                    <div class="card overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 dark:bg-slate-700">
                                <tr>
                                    <th class="p-4 border-b">ID</th>
                                    <th class="p-4 border-b">${t('name')}</th>
                                    <th class="p-4 border-b">${t('temp')}</th>
                                    <th class="p-4 border-b">Timestamp</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${state.history.length > 0 ? state.history.map(h => `
                                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/50">
                                        <td class="p-4 border-b">#${h.id}</td>
                                        <td class="p-4 border-b">${h.warehouse}</td>
                                        <td class="p-4 border-b font-mono font-bold text-sky-600">${h.temp}°C</td>
                                        <td class="p-4 border-b text-slate-500">${h.time}</td>
                                    </tr>
                                `).join('') : `<tr><td colspan="4" class="p-10 text-center">${t('emptyHistory')}</td></tr>`}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderWarehouseList() {
            // Group by Sensitivity
            const high = state.warehouses.filter(w => w.sensitivity === 'High' || w.sensitivity === 'Critical');
            const low = state.warehouses.filter(w => w.sensitivity === 'Low' || w.sensitivity === 'Medium');

            const warehouseCard = (w) => `
                <div class="card p-4 flex justify-between items-center border-l-4 ${w.sensitivity === 'Critical' ? 'border-red-500' : 'border-sky-500'}">
                    <div>
                        <h4 class="font-bold">${w.name}</h4>
                        <p class="text-xs text-slate-500">${w.location} | ${w.type}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-2xl font-bold text-sky-700">${w.temp}°C</span>
                        <div class="text-[10px] px-2 py-0.5 rounded-full bg-slate-100 dark:bg-slate-700 inline-block ml-2 uppercase font-bold">
                            ${w.sensitivity}
                        </div>
                    </div>
                </div>
            `;

            return `
                <div class="p-6 space-y-8">
                    <h1 class="text-2xl font-bold">${t('warehouseList')}</h1>
                    
                    <section>
                        <h2 class="text-red-600 dark:text-red-400 font-bold mb-4 flex items-center gap-2">
                             ⚠ Peka Tinggi / High Sensitivity (Strict Monitoring)
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${high.map(warehouseCard).join('')}
                        </div>
                    </section>

                    <section>
                        <h2 class="text-sky-600 font-bold mb-4 flex items-center gap-2">
                             Standard Monitoring
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${low.map(warehouseCard).join('')}
                        </div>
                    </section>
                </div>
            `;
        }

        function renderSettings() {
            return `
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-2xl font-bold">${t('settings')}</h1>
                        <button onclick="addWarehouse()" class="btn-primary px-4 py-2 rounded-lg flex items-center gap-2">
                            + ${t('addWarehouse')}
                        </button>
                    </div>
                    
                    <div class="card overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 dark:bg-slate-700">
                                <tr>
                                    <th class="p-4 border-b">${t('name')}</th>
                                    <th class="p-4 border-b">${t('type')}</th>
                                    <th class="p-4 border-b">${t('sensitivity')}</th>
                                    <th class="p-4 border-b">${t('actions')}</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${state.warehouses.map(w => `
                                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/50">
                                        <td class="p-4 border-b font-medium">${w.name}</td>
                                        <td class="p-4 border-b">${w.type}</td>
                                        <td class="p-4 border-b">
                                            <span class="px-2 py-1 rounded-md text-xs font-bold ${w.sensitivity === 'Critical' ? 'bg-red-100 text-red-700' : 'bg-sky-100 text-sky-700'}">
                                                ${w.sensitivity}
                                            </span>
                                        </td>
                                        <td class="p-4 border-b">
                                            <button onclick="editWarehouse(${w.id})" class="text-sky-600 hover:underline mr-3">${t('edit')}</button>
                                            <button onclick="deleteWarehouse(${w.id})" class="text-red-500 hover:underline">${t('delete')}</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    <!-- Decorative elements -->
                    <div class="mt-12 opacity-20 flex justify-around">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 3v18"/><path d="M12 3v18"/><path d="M17 3v18"/><path d="M3 7h18"/><path d="M3 12h18"/><path d="M3 17h18"/></svg>
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6l-4-4"/></svg>
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10V6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4M3 10l9 7 9-7M3 10v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V10"/></svg>
                    </div>
                </div>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            
            if (!state.isLoggedIn) {
                app.innerHTML = renderLogin();
                return;
            }

            let content = '';
            switch(state.currentMenu) {
                case 'dashboard': content = renderDashboard(); break;
                case 'history': content = renderHistory(); break;
                case 'list': content = renderWarehouseList(); break;
                case 'settings': content = renderSettings(); break;
            }

            app.innerHTML = `
                <div class="flex min-h-screen">
                    ${renderSidebar()}
                    <div class="flex-1 flex flex-col">
                        ${renderHeader()}
                        <main class="flex-1 overflow-y-auto">
                            ${content}
                        </main>
                    </div>
                </div>
            `;
        }

        // Initial render
        window.onload = render;
    </script>
</body>
</html>
